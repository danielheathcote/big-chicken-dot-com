name: Deploy to AWS

on:
  push:
    branches:
      - main

# Avoid overlapping deploys stepping on the same CloudFormation stack.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Force Node 24 so actions targeting the deprecated Node 20 stop warning.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Backend: build the Rust Lambda (arm64) ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install cargo-lambda
        run: pipx install cargo-lambda

      - name: Install Zig
        # cargo-lambda uses Zig as the cross-linker; it must be a real `zig`
        # binary on PATH (0.13.0+).
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build Lambda binary
        working-directory: backend
        run: cargo lambda build --release --arm64

      # --- Infra: deploy the whole stack (bucket + site + Lambda) via CDK ---
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install infra dependencies
        working-directory: infra
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: CDK deploy
        working-directory: infra
        run: npx cdk deploy --require-approval never
